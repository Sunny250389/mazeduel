<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="./favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="MazeDuel: Neon maze racer with traps, sharing & leaderboards!" />
    <link rel="manifest" href="./manifest.json" />
    <script>
      window.__MAZEDUEL_GAMEPIX_READY__ = false;

      window.__onGamePixLoaded = function () {
        window.__MAZEDUEL_GAMEPIX_READY__ = !!window.GamePix;
        window.dispatchEvent(new CustomEvent("gamepix:ready", {
          detail: { ready: window.__MAZEDUEL_GAMEPIX_READY__ }
        }));
      };
    </script>
    <script src="https://integration.gamepix.com/sdk/v3/gamepix.sdk.js" onload="window.__onGamePixLoaded()" async></script>

      window.__onGamePixLoaded = function () {

        window.dispatchEvent(new CustomEvent("gamepix:ready", {

    <script src="https://integration.gamepix.com/sdk/v3/gamepix.sdk.js" onload="window.__onGamePixLoaded()" async></script>
    <title>MazeDuel</title>

    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0a0a1a;
        color: #fff;
        overflow: hidden;
      }
      #root {
        max-width: 100vw;
        min-height: 100vh;
      }
      * {
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <noscript>You need JavaScript enabled to run this app.</noscript>

    <div id="root"></div>
  </body>
</html>
