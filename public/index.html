<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="./favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="MazeDuel: Neon maze racer with traps, sharing & leaderboards!" />
    <link rel="manifest" href="./manifest.json" />
    <script>
      // Set the GamePix SDK version to load
      window.GamePix = window.GamePix || {};
      const methods = ['resume', 'pause', 'updateScore', 'updateLevel', 'happyMoment', 'gameOver'];
      methods.forEach(method => {
        if (typeof window.GamePix[method] !== 'function') {
          window.GamePix[method] = function() {
            console.log(`[GamePix Mock] ${method} called with:`, arguments);
          };
        }
      });
    </script>

    <script src="https://integration.gamepix.com/sdk/v3/gamepix.sdk.js" onload="window.__onGamePixLoaded()" async></script>
    <title>MazeDuel</title>

    <style>
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0a0a1a;
        color: #fff;
        overflow: hidden;
      }
      * {
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <noscript>You need JavaScript enabled to run this app.</noscript>

    <div id="root"></div>
  </body>
</html>
